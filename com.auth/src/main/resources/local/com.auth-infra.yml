spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${OIDC_ISSUER_URI:http://localhost:8081/realms/egm}"
          jwk-set-uri: "${OIDC_JWK_SET_URI:http://localhost:8081/realms/egm/protocol/openid-connect/certs}"
      client:
        provider:
          keycloak:
            issuer-uri: "${OIDC_ISSUER_URI:http://localhost:8081/realms/egm}"
        registration:
          keycloak-admin:
            client-id: "${KEYCLOAK_ADMIN_CLIENT_ID:egm-auth-admin}"
            client-secret: "${KEYCLOAK_ADMIN_CLIENT_SECRET:change-me}"

auth:
  keycloak:
    base-url: "${KEYCLOAK_BASE_URL:http://localhost:8081}"
    realm: "${KEYCLOAK_REALM:egm}"
    admin-client-id: "${KEYCLOAK_ADMIN_CLIENT_ID:egm-auth-admin}"
    admin-client-secret: "${KEYCLOAK_ADMIN_CLIENT_SECRET:change-me}"

management:
  otlp:
    tracing:
      endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}"
