server {
    listen 80;
    server_name _;
    client_max_body_size 500m;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://srv-cgm-importer:8080/api/;
    }
}
